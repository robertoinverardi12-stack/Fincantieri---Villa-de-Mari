<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andria Respira — Dodimoss</title>
<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Overpass', sans-serif; background: #f7f5ef; min-height: 100vh; display: flex; flex-direction: column; }
  header { background: #ffffff; padding: 1.4rem 3rem; border-bottom: 1px solid #e8e4d8; display: flex; align-items: center; }
  .logo { font-size: 24px; font-weight: 300; color: #1a1a1a; line-height: 1.1; letter-spacing: -0.01em; }
  .logo span { display: block; }
  .accent { width: 32px; height: 2px; background: #cfb023; margin-top: 7px; }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 2rem; }
  .video-card { background: white; border-radius: 4px; overflow: hidden; width: 100%; max-width: 960px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  video { width: 100%; display: block; aspect-ratio: 16/9; background: #111; }
  .video-info { padding: 1.2rem 1.8rem; }
  .video-title { font-size: 13px; font-weight: 400; color: #888; letter-spacing: 0.1em; text-transform: uppercase; }
  footer { padding: 1rem 3rem; background: white; border-top: 1px solid #e8e4d8; font-size: 11px; color: #b0aa9a; letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
<header>
  <div>
    <div class="logo"><span>dodi</span><span>moss</span></div>
    <div class="accent"></div>
  </div>
</header>
<main>
  <div class="video-card">
    <video controls preload="metadata">
      <source src="https://www.dropbox.com/scl/fi/hj9vfrk1pi2escsbckhta/2026_fbastudio_Andria-Respira_4-K-UPDATE-3.mp4?rlkey=kot50fduzjo32aox4xxd51ftj&st=xfepu47k&dl=1" type="video/mp4">
    </video>
    <div class="video-info">
      <div class="video-title">Andria Respira — 4K</div>
    </div>
  </div>
</main>
<footer>dodimoss studio &middot; architettura</footer>
</body>
</html>
